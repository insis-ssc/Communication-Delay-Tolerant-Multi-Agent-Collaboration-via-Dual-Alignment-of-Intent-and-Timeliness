# --- QMIX specific parameters ---

save_model: True # Save the models to disk
save_model_interval: 400000 # Save models after this many timesteps

# use epsilon greedy action selector
action_selector: "epsilon_greedy"
epsilon_start: 1.0
epsilon_finish: 0.05
epsilon_anneal_time: 50000

runner: "episode"
batch_size_run: 1 # Number of environments to run in parallel

buffer_size: 5000

# update the target network every {} episodes
target_update_interval: 200

# use the Q_Learner to train
agent_output_type: "q"
learner: "Code"
double_q: True
mixer: "qmix"
mixing_embed_dim: 32
hypernet_layers: 2
hypernet_embed: 64

mac: "Code"
agent: "Code"

latent_dim: 8
time_dim: 8
intent_dim: 16
attention_dim: 32
nn_hidden_size: 64
entropy_loss_weight: 0.01
continous_loss_weight: 0.01
infer_loss_weight: 0.01
embed_loss_weight: 0.01
msg_l1_reg_loss_weight: 0
var_floor: 0.002
log_weights: True
delay_evaluate: False
fixed_delay: True
delay_mean: 3
delay_var: 2
name: "Code"
